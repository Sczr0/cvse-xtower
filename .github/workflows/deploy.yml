name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install & build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build Go backend (Linux)
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o cvse-api .

      - name: Deploy via SSH pipe
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
        run: |
          # Write SSH key
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Tar & pipe to server
          tar cz build/ backend/cvse-api deploy/cvse-api.service | \
            ssh -o StrictHostKeyChecking=accept-new \
                -i /tmp/deploy_key \
                -p $SSH_PORT \
                $SSH_USER@$SSH_HOST \
                "cd /opt/cvse && rm -rf build && tar xz && sudo mv backend/cvse-api . && sudo cp deploy/cvse-api.service /etc/systemd/system/ && sudo rm -rf backend deploy && sudo systemctl daemon-reload && sudo systemctl restart cvse-api && echo '✅ Deploy complete'"

          rm -f /tmp/deploy_key
